syntax = "proto3";

package user;

import "google/protobuf/empty.proto";

// Represents a user in the system.
message User {
  string id = 1;
  string name = 2;
  string email = 3;
}

// Used for operations that need only the user id.
message UserRequest {
  string id = 1;
}

// Used to return multiple users.
message UserList {
  repeated User users = 1;
}

// Generic response for create/delete operations.
message ResponseMessage {
  bool success = 1;
  string message = 2;
}

service UserService {
  rpc CreateUser(User) returns (ResponseMessage);
  rpc GetUser(UserRequest) returns (User);
  rpc ListUsers(google.protobuf.Empty) returns (UserList);
  rpc DeleteUser(UserRequest) returns (ResponseMessage);
}
