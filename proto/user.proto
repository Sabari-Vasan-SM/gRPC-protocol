syntax = "proto3";

package chat;

// A single chat payload sent by clients and broadcast by the server.
message ChatMessage {
  string user = 1;
  string message = 2;
  string timestamp = 3;
  bool isSystem = 4;
}

service ChatService {
  // Bidirectional stream:
  // - client sends messages continuously
  // - server broadcasts messages to all connected clients
  rpc Chat(stream ChatMessage) returns (stream ChatMessage);
}
